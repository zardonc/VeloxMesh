services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: veloxmesh_redis_stack
    command: redis-stack-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: veloxmesh_redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsightdata:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: veloxmesh_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: veloxmesh_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: veloxmesh_otel_collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8889:8889" # Prometheus exporter
    volumes:
      - ./docker/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml
    restart: unless-stopped

volumes:
  redisdata:
    name: veloxmesh_redis_stack_data
  redisinsightdata:
    name: veloxmesh_redisinsight_data
  qdrantdata:
    name: veloxmesh_qdrant_data

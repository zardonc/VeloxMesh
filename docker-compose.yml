services:
  postgres:
    # 使用官方推荐的 pgvector 镜像（基于 PostgreSQL 18）
    image: pgvector/pgvector:pg18
    container_name: veloxmesh_pgsql_vector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-veloxmesh_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8.8.0-alpine
    container_name: veloxmesh_redis_cache
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
    name: veloxmesh_pgsql_data
  redisdata:
    name: veloxmesh_redis_data

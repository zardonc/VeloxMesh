name: veloxmesh

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: veloxmesh_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres18cluster:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgvector-init:
    image: pgvector/pgvector:pg18
    container_name: veloxmesh_pgvector_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:?POSTGRES_USER is required}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATABASE: ${POSTGRES_DB:?POSTGRES_DB is required}
    command: ["sh", "-c", "psql -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS vector;'"]
    restart: "no"

volumes:
  postgres18cluster:
    name: veloxmesh_postgres18_cluster_data

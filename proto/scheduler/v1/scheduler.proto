syntax = "proto3";

package scheduler.v1;

option go_package = "veloxmesh/internal/scheduler/schedulerv1;schedulerv1";

service TaskScheduler {
  rpc BatchScoreTasks(BatchScoreRequest) returns (BatchScoreResponse);
}

message BatchScoreRequest {
  repeated TaskFeature tasks = 1;
}

message TaskFeature {
  string task_id = 1;
  string model_class = 2;
  int64 estimated_input_tokens = 3;
  int64 estimated_output_tokens = 4;
  bool stream = 5;
  string priority = 6;
  string timeout_class = 7;
  int64 enqueue_time_ms = 8;
  string request_kind = 9;
  string route_hint = 10;
  bool has_tool_calls = 11;
  int32 tool_call_depth = 12;
  int32 turn_count = 13;
  bool multimodal = 14;
  int32 question_count = 15;
  int32 code_block_count = 16;
  bool enumeration_hint = 17;
  int32 instruction_verb_count = 18;
  int32 max_sentence_length_bucket = 19;
  int32 vocabulary_richness_bucket = 20;
  double confidence_hint = 21;
  double uncertainty_hint = 22;
}

message BatchScoreResponse {
  repeated ScoreResult results = 1;
}

message ScoreResult {
  string task_id = 1;
  double score = 2;
  string priority = 3;
  int64 predicted_latency_ms = 4;
  double confidence = 5;
  string scheduler_version = 6;
  string reason = 7;
}

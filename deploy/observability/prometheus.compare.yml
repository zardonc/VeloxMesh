global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/scheduler-alerts.yml

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway-compare:8080"]

  - job_name: scheduler-onnx
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler-onnx:9091"]

  - job_name: scheduler-heuristic
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler-heuristic:9091"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
